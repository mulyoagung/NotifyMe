name: notifyme
description: A new Flutter application to monitor web changes and send notifications.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  http: ^1.1.0
  html: ^0.15.4
  sqflite: ^2.3.0
  sqflite_common_ffi: ^2.3.0  # For Windows SQLite support
  path_provider: ^2.1.1
  path: ^1.8.3
  flutter_local_notifications: ^17.1.2
  local_notifier: ^0.1.6  # For Windows Notification
  workmanager: ^0.9.0     # Background task Android
  webview_flutter: ^4.4.2
  google_fonts: ^6.1.0
  url_launcher: ^6.2.2
  shared_preferences: ^2.2.2
  flutter_inappwebview: ^6.1.5
  crypto: ^3.0.7
  connectivity_plus: ^7.0.0
  diff_match_patch: ^0.4.1
  webview_flutter_web: ^0.2.3+4
  webview_windows: 0.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_launcher_icons: "^0.13.1"

flutter_launcher_icons:
  android: "ic_launcher"
  ios: false


  image_path: "assets/logo.png"

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png